<script>
(function() {
  var KEY = 'nv_like_huzhou-trial-production';
  var liked = localStorage.getItem(KEY) === '1';
  var count = parseInt(localStorage.getItem(KEY + '_c') || '0', 10);
  var btn = document.getElementById('like-btn');
  var heart = document.getElementById('heart');
  var cnt = document.getElementById('like-count');
  function render() {
    if (liked) { btn.classList.add('liked'); heart.textContent = '♥'; }
    else { btn.classList.remove('liked'); heart.textContent = '♡'; }
    cnt.textContent = count;
  }
  render();
  window.toggleLike = function() {
    liked = !liked;
    count = liked ? count + 1 : Math.max(0, count - 1);
    localStorage.setItem(KEY, liked ? '1' : '0');
    localStorage.setItem(KEY + '_c', count.toString());
    render();
  };
})();
</script>

  // -- novora logo micro-collision (5s) --
  (function logoChain() {
    var delay = 5000;
    setTimeout(function() {
      var letters = document.querySelectorAll('.site-hd .logo-l');
      if (!letters.length) { logoChain(); return; }
      letters.forEach(function(l, i) {
        setTimeout(function() {
          var cls = i === letters.length - 1 ? 'lrebound' : 'lnudge';
          l.classList.add(cls);
          setTimeout(function() { l.classList.remove(cls); }, i === letters.length - 1 ? 350 : 200);

      });
      logoChain();
    }, delay);
  })();
