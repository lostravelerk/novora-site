<script>
(function(){
  var meta = document.querySelector('meta[name="version"]');
  if (!meta) return;
  var localV = meta.content;
  var retries = parseInt(sessionStorage.getItem('nv_ver_retry')||'0');
  if (retries > 3) { sessionStorage.removeItem('nv_ver_retry'); return; }
  var basePath = (location.hostname.indexOf('github.io') > -1 || location.pathname.indexOf('/novora-site/') === 0) ? '/novora-site/' : '/';
  fetch(basePath + 'version.json?t=' + Date.now(), {cache:'no-store'})
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.version && d.version !== localV) {
        sessionStorage.setItem('nv_ver_retry', String(retries + 1));
        var u = location.href.split('?')[0] + '?v=' + d.version + '&t=' + Date.now();
        location.replace(u);
      } else {
        sessionStorage.removeItem('nv_ver_retry');
        // Inject cache buster into all article links
        var bust = '?v=' + d.version + '&t=' + Date.now();
        document.querySelectorAll('.article-card').forEach(function(card){
          var href = card.getAttribute('href');
          if (href && href.indexOf('?v=') === -1) {
            card.setAttribute('href', href + bust);
          }
        });
      }
    })
    .catch(function(){});
})();
</script>
<script>
(function(){
  function syncFramePath() {
    if (!window.parent || window.parent === window) return;
    var path = location.pathname.replace(/^\/novora-site\/?/, '/');
    if (!path || path === '/index.html') path = '/';
    window.parent.postMessage({ type:'faste_sync', title:document.title, path:path + location.search + location.hash }, '*');
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', syncFramePath);
  else syncFramePath();
})();
</script>

      '注塑制造','Injection Molding','模具开发','自动化','智能制造',
      'Assembly','Decoration','Industry 4.0','Digital Twin',
      'Smart Factory','Cobot','Lights-out Mfg','Robot Arm',
      // Quality & Testing
      'CPK','SPC','AQL','检测方法','可靠性测试','供应商审核',
      '真空保持测试','包装测试','GMP','ISO','ISO 22716',
      'Digital QC','AI Vision','Traceability','Leak Test','Drop Test',
      // Sustainability
      'ESG','循环经济','轻量化','碳中和','碳足迹',
      'Net Zero','Carbon Neutral','Science Based','LCA',
      'Refill Revolution','Closed Loop','Recyclable',
      // Beauty & Market Trends
      'Clean Beauty','Vegan Beauty','Blue Beauty','Waterless Beauty',
      'Dermocosmetics','Microbiome','Skinimalism','Slow Beauty',
      'Indie Brand','K-Beauty','C-Beauty','J-Beauty','DTC',
      'Skin Streaming','Cosmeceutical','Active Ingredient',
      // Business & Supply Chain
      '供应链','出海','OEM','ODM','Private Label',
      'Nearshoring','Resilient Supply','China+1','Procurement',
      'Co-development','Speed-to-Market','Low MOQ',
      // Innovation
      'Smart Packaging','Connected Pkg','NFC Packaging',
      'Tamper Evident','Child Resistant','Airless Technology',
      'Dose Accuracy','Anti-counterfeit','Mono-dose'
    ];

    // Deduplicate
    var seen = {}, unique = [];
    words.forEach(function(w){ if (!seen[w]) { seen[w] = 1; unique.push(w); } });

    // Shuffle and pick 30-45 words — not filling, plenty of white space
    function shuffle(a) {
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
      }
    }
    shuffle(unique);
    var count = Math.min(unique.length, 68 + Math.floor(Math.random() * 16));
    var picked = unique.slice(0, count);

    // Color palette: cold gray-blue tones only
    var colors = ['#64748B','#475569','#556271','#6B7280','#788596'];

    var allSpans = [];

    function layout() {
      el.innerHTML = '';
      allSpans = [];
      var vw = window.innerWidth;
      var cw = 700;
      if (vw <= cw + 40) return;
      var gutterW = Math.max(0, (vw - cw) / 2 - 10);
      if (gutterW < 60) return;
      var gutters = [
        { side: 'left',  x: 0, w: gutterW },
        { side: 'right', x: vw - gutterW, w: gutterW }
      ];

      var placed = []; // {top, left, width, height, row}

      picked.forEach(function(word) {
        var g = gutters[Math.floor(Math.random() * 2)];

        // Tiered sizing
        var isBrand    = word === 'novora' || word === 'megee' || word === 'bdf' || word === 'megee⁺';
        var isShort    = word.length <= 3;
        var size = isBrand ? (18 + Math.floor(Math.random() * 8))
                 : isShort ? (14 + Math.floor(Math.random() * 10))
                 : (11 + Math.floor(Math.random() * 11)); // 11-21px

        var opacity = 0.10 + Math.random() * 0.08; // 10-18%
        var rotation = -15 + Math.random() * 30;     // -15° to +15°
        var color = colors[Math.floor(Math.random() * colors.length)];

        // Weight: mostly 400, occasionally 500
        var weight = Math.random() < 0.2 ? 500 : 400;

        // Estimate text width: ~0.6 * size * charCount for CJK, ~0.5 for Latin
        var isLatin = /^[A-Za-z]/.test(word);
        var estW = isLatin ? size * word.length * 0.55 : size * word.length * 0.7;
        var estH = size * 1.3;

        // Find a position that doesn't overlap — try up to 30 times
        var left, top, tries = 0;
        do {
          left = g.x + Math.random() * Math.max(0, g.w - estW - 8);
          top  = Math.random() * 90;
          tries++;
        } while (tries < 50 && placed.some(function(p) {
          return Math.abs(left - p.left) < (estW + p.width) / 2 + 12
              && Math.abs(top - p.top)  < (estH + p.height) / 2 + 8;
        }));

        placed.push({ left: left, top: top, width: estW, height: estH });

        var span = document.createElement('span');
        span.className = 'cw';
        span.textContent = word;
        span.setAttribute('data-opacity', opacity.toFixed(2));

        span.style.cssText =
          'font-size:' + size + 'px;' +
          'font-weight:' + weight + ';' +
          'color:' + color + ';' +
          'left:' + left + 'px;' +
          'top:' + top + '%;' +
          '--rot:' + rotation + 'deg;' +
          'opacity:' + opacity + ';';

        el.appendChild(span);
        allSpans.push(span);
      });
    }

    // ── Single-word breathe: every 30-60s, one random word pulses ──
    function pulseOne() {
      if (!allSpans.length) return;
      var idx = Math.floor(Math.random() * allSpans.length);
      var span = allSpans[idx];
      var baseOp = parseFloat(span.getAttribute('data-opacity'));
      var peakOp = Math.min(0.22, baseOp * 1.5); // peak ~12-22%, never too bright

      // Rise
      span.style.opacity = peakOp;
      // Fall back after 1s
      setTimeout(function() {
        span.style.opacity = baseOp;
      }, 1000);

      // Schedule next
      var next = 30000 + Math.random() * 30000; // 30-60s
      setTimeout(pulseOne, next);
    }

    layout();
    setTimeout(pulseOne, 5000); // first pulse after 5s delay

    window.addEventListener('resize', function(){
      clearTimeout(window._scTimer);
      window._scTimer = setTimeout(layout, 500);
    });
  })();

  // ── novora logo micro-collision (8-15s) ──
  (function logoChain() {
    var delay = 5000;
    setTimeout(function() {
      var letters = document.querySelectorAll('.site-logo .logo-l');
      if (!letters.length) { logoChain(); return; }
      letters.forEach(function(l, i) {
        setTimeout(function() {
          var cls = i === letters.length - 1 ? 'lrebound' : 'lnudge';
          l.classList.add(cls);
          setTimeout(function() { l.classList.remove(cls); }, i === letters.length - 1 ? 350 : 200);
        }, i * 130);
      });
      logoChain();
    }, delay);
  })();

  // ── megee wink: ↗ arrow micro-bounce ──
  (function wink() {
    var el = document.getElementById('megee-wink');
    if (!el) return;
    var delay = 5000;
    setTimeout(function() {
      el.classList.add('wink-anim');
      setTimeout(function() { el.classList.remove('wink-anim'); }, 350);
      wink();
    }, delay);
  })();
</script>

<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
<script>
  // ── Subscribe Modal ──
  (function(){
    var btn = document.getElementById('sub-btn');
    var ov = document.getElementById('modal-overlay');
    var close = document.getElementById('modal-close');
    var form = document.getElementById('sub-form');
    var msg = document.getElementById('sub-msg');
    var submitBtn = document.getElementById('sub-submit');

    btn.addEventListener('click', function(){ ov.classList.add('show'); });
    close.addEventListener('click', function(){ ov.classList.remove('show'); });
    ov.addEventListener('click', function(e){ if (e.target === ov) ov.classList.remove('show'); });

    form.addEventListener('submit', function(e){
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = '提交中...';
      msg.className = 'sub-msg'; msg.textContent = '';

      var data = new FormData(form);

      fetch('https://formsubmit.co/ajax/53432885@qq.com', {
        method: 'POST', body: data, headers: { 'Accept': 'application/json' }
      })
      .then(function(r){
        if (r.ok) {
          msg.className = 'sub-msg success';
          msg.textContent = '订阅成功！';
          form.reset();
          submitBtn.textContent = '已订阅';
        } else {
          return r.json().then(function(d){ throw new Error(d.error || '提交失败'); });
        }
      })
      .catch(function(err){
        msg.className = 'sub-msg error';
        msg.textContent = '提交失败，请稍后重试';
        submitBtn.disabled = false;
        submitBtn.textContent = '提交订阅';
      });
    });
  })();

  // Auto-refresh: check for new version on load & tab return
  (function() {
    var VER = 'https://lostravelerk.github.io/novora-site/version.txt';
    var KEY = 'nv_v';
    function check() {
      fetch(VER + '?t=' + Date.now(), {cache: 'no-store'})
        .then(function(r) { return r.text(); })
        .then(function(v) {
          v = v.trim();
          var old = localStorage.getItem(KEY);
          localStorage.setItem(KEY, v);
          if (old && old !== v) {
            var u = location.href.split('?')[0] + '?v=' + v + '&t=' + Date.now();
            location.replace(u);
          }
        })
        .catch(function(){}); // offline: silent
    }
    check();
    document.addEventListener('visibilitychange', function() {
      if (!document.hidden) check();
    });
  })();

  // Format UV counter: "No.12,486"
  (function check() {
    var el = document.getElementById('busuanzi_value_site_uv');
    if (el && el.textContent && /^\d+$/.test(el.textContent.trim())) {
      el.textContent = Number(el.textContent.trim()).toLocaleString('en-US');
    } else {
      setTimeout(check, 800);
    }
  })();
</script>
