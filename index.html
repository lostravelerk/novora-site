<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>novora — 个人文章</title>
<style>
  :root {
    --bg: #F9FAFB;
    --card: #FFFFFF;
    --text: #1F2937;
    --muted: #6B7280;
    --accent: #1A3F6E;
    --accent-l: #2563EB;
    --border: #E5E7EB;
    --tag-bg: #EFF6FF;
    --tag-text: #1D4ED8;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    font-size: 17px; line-height: 1.8; color: var(--text);
    background: var(--bg); padding: 20px;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 720px; margin: 0 auto; }

  /* Header */
  .site-header {
    text-align: center; padding: 60px 0 40px;
  }
  .site-header h1 {
    font-size: 28px; font-weight: 700; color: var(--accent);
    letter-spacing: -0.5px;
  }
  .site-header .sub {
    font-size: 16px; color: var(--muted); margin-top: 8px;
  }

  /* Article Card */
  .article-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px 32px; margin-bottom: 16px;
    cursor: pointer; transition: box-shadow 0.15s, border-color 0.15s;
    display: block; text-decoration: none; color: inherit;
  }
  .article-card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    border-color: var(--accent-l);
  }
  .article-card .meta {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 10px; flex-wrap: wrap;
  }
  .article-card .date {
    font-size: 14px; color: var(--muted); font-weight: 500;
  }
  .article-card .tags {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .article-card .tag {
    font-size: 12px; padding: 2px 10px;
    background: var(--tag-bg); color: var(--tag-text);
    border-radius: 4px; font-weight: 500;
  }
  .article-card h2 {
    font-size: 22px; font-weight: 700; line-height: 1.4;
    margin-bottom: 8px; color: var(--accent);
  }
  .article-card p {
    font-size: 15px; color: var(--muted); line-height: 1.7;
  }

  /* Footer */
  .site-footer {
    text-align: center; padding: 48px 0 32px;
    color: var(--muted); font-size: 14px;
  }

  @media (max-width: 600px) {
    body { padding: 12px; font-size: 16px; }
    .site-header { padding: 40px 0 28px; }
    .site-header h1 { font-size: 24px; }
    .article-card { padding: 20px 18px; }
    .article-card h2 { font-size: 19px; }
  }
</style>
</head>
<body>
<div class="container">

  <header class="site-header">
    <h1>novora</h1>
    <p class="sub">个人文章 · 想法存档</p>
  </header>

  <!-- Article list — newest first -->

      {

      {

      }
    ];

    const list = document.getElementById('article-list');
    articles.forEach(a => {
      const card = document.createElement('a');
      card.className = 'article-card';
      card.href = a.file;
      card.innerHTML =
        '<div class="meta">' +
          '<span class="date">' + a.date + '</span>' +
          '<span class="tags">' +
            a.tags.map(t => '<span class="tag">' + t + '</span>').join('') +
          '</span>' +
        '</div>' +
        '<h2>' + a.title + '</h2>' +
        '<p>' + a.summary + '</p>';
      list.appendChild(card);
    });
  </script>

  <footer class="site-footer">
    novora.cc · 文章持续更新中
  </footer>

</div>
</body>
</html>
