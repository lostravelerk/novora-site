      '精华瓶','膏霜罐','替换包装','单一材料','化妆品包装',
      '色母粒','高分子材料','材料兼容性','PET','PP','PE','PCR',
      'Masterbatch','Polymer','Material Science',
      '注塑制造','Injection Molding','模具开发','自动化','智能制造',
      'Assembly','Decoration','Quality Control',
      'CPK','SPC','AQL','检测方法','可靠性测试','供应商审核',
      '真空保持测试','包装测试','GMP','ISO',
      'ESG','循环经济','轻量化','零填埋','碳足迹','Carbon Footprint',
      '供应链','出海','品牌代工','OEM','ODM','Private Label',
      'Beauty Tech','Clean Beauty','Indie Brand'
    ];

    var seen = {}, unique = [];
    words.forEach(function(w){ if (!seen[w]) { seen[w] = 1; unique.push(w); } });

    var count = Math.min(unique.length, 35 + Math.floor(Math.random() * 16));
    function shuffle(a) {
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
      }
    }
    shuffle(unique);
    var picked = unique.slice(0, count);

    function layout() {
      el.innerHTML = '';
      var vw = window.innerWidth;
      var cw = 700;
      if (vw <= cw + 40) return;
      var gutterW = Math.max(0, (vw - cw) / 2 - 10);
      if (gutterW < 60) return;
      var gutters = [
        { side: 'left',  x: 0, w: gutterW },
        { side: 'right', x: vw - gutterW, w: gutterW }
      ];

      picked.forEach(function(word) {
        var g = gutters[Math.floor(Math.random() * 2)];
        var span = document.createElement('span');
        span.className = 'cw';
        span.textContent = word;

        var size = 10 + Math.floor(Math.random() * 13);
        var opacity = 0.04 + Math.random() * 0.06;
        var rotation = -18 + Math.random() * 36;
        var dx = (Math.random() - 0.5) * 3;
        var dy = (Math.random() - 0.5) * 3;
        var dur = 20 + Math.random() * 40;
        var delay = Math.random() * 30;
        var weight = Math.random() < 0.3 ? 600 : 400;

        var left = g.x + Math.random() * (g.w - size * word.length * 0.7);
        var top  = Math.random() * 90;

        span.style.cssText =
          'font-size:' + size + 'px;' +
          'font-weight:' + weight + ';' +
          'left:' + left + 'px;' +
          'top:' + top + '%;' +
          '--rot:' + rotation + 'deg;' +
          '--dx:' + dx + 'px;' +
          '--dy:' + dy + 'px;' +
          '--op:' + opacity + ';' +
          'opacity:' + opacity + ';' +
          'animation: cw-drift ' + dur + 's ease-in-out infinite, cw-breathe ' + (dur * 0.6) + 's ease-in-out infinite;' +
          'animation-delay:' + delay + 's';

        el.appendChild(span);
      });
    }

    layout();
    window.addEventListener('resize', function(){
      clearTimeout(window._scTimer);
      window._scTimer = setTimeout(layout, 400);
    });
  })();

  // ── novora logo micro-collision (8-15s) ──
  (function logoChain() {
    var delay = 5000;
    setTimeout(function() {
      var letters = document.querySelectorAll('.site-logo .logo-l');
      if (!letters.length) { logoChain(); return; }
      letters.forEach(function(l, i) {
        setTimeout(function() {
          var cls = i === letters.length - 1 ? 'lrebound' : 'lnudge';
          l.classList.add(cls);
          setTimeout(function() { l.classList.remove(cls); }, i === letters.length - 1 ? 350 : 200);
        }, i * 130);
      });
      logoChain();
    }, delay);
  })();

  // ── megee wink: ↗ arrow micro-bounce ──
  (function wink() {
    var el = document.getElementById('megee-wink');
    if (!el) return;
    var delay = 5000;
    setTimeout(function() {
      el.classList.add('wink-anim');
      setTimeout(function() { el.classList.remove('wink-anim'); }, 350);
      wink();
    }, delay);
  })();
</script>

<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
<script>
  // ── Subscribe Modal ──
  (function(){
    var btn = document.getElementById('sub-btn');
    var ov = document.getElementById('modal-overlay');
    var close = document.getElementById('modal-close');
    var form = document.getElementById('sub-form');
    var msg = document.getElementById('sub-msg');
    var submitBtn = document.getElementById('sub-submit');

    btn.addEventListener('click', function(){ ov.classList.add('show'); });
    close.addEventListener('click', function(){ ov.classList.remove('show'); });
    ov.addEventListener('click', function(e){ if (e.target === ov) ov.classList.remove('show'); });

    form.addEventListener('submit', function(e){
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = '提交中...';
      msg.className = 'sub-msg'; msg.textContent = '';

      var data = new FormData(form);

      fetch('https://formsubmit.co/ajax/53432885@qq.com', {
        method: 'POST', body: data, headers: { 'Accept': 'application/json' }
      })
      .then(function(r){
        if (r.ok) {
          msg.className = 'sub-msg success';
          msg.textContent = '订阅成功！';
          form.reset();
          submitBtn.textContent = '已订阅';
        } else {
          return r.json().then(function(d){ throw new Error(d.error || '提交失败'); });
        }
      })
      .catch(function(err){
        msg.className = 'sub-msg error';
        msg.textContent = '提交失败，请稍后重试';
        submitBtn.disabled = false;
        submitBtn.textContent = '提交订阅';
      });
    });
  })();

  // Auto-refresh: check for new version on load & tab return
  (function() {
    var VER = 'https://coadyke.github.io/novora-site/version.txt';
    var KEY = 'nv_v';
    function check() {
      fetch(VER + '?t=' + Date.now(), {cache: 'no-store'})
        .then(function(r) { return r.text(); })
        .then(function(v) {
          v = v.trim();
          var old = localStorage.getItem(KEY);
          localStorage.setItem(KEY, v);
          if (old && old !== v) location.reload();
        })
        .catch(function(){}); // offline: silent
    }
    check();
    document.addEventListener('visibilitychange', function() {
      if (!document.hidden) check();
    });
  })();

  // Format UV counter: "No.12,486"
  (function check() {
    var el = document.getElementById('busuanzi_value_site_uv');
    if (el && el.textContent && /^\d+$/.test(el.textContent.trim())) {
      el.textContent = (6968 + Number(el.textContent.trim())).toLocaleString('en-US');
    } else {
      setTimeout(check, 800);
    }
  })();
</script>
