<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<title>novora — 探索制造与创新的边界</title>
<style>
  :root {
    --bg: #F7F7F7; --card: #FFFFFF; --text: #1F2937; --muted: #6B7280; --faint: #9CA3AF;
    --accent: #0F2747; --accent-l: #1A3F6E; --tag-bg: #EEF3F9; --tag-text: #1A3F6E;
    --pill-bg: #F3F4F6; --pill-active-bg: #0F2747; --pill-active-text: #FFFFFF;
    --pill-text: #6B7280; --pill-border: #E5E7EB;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; font-size: 16px; line-height: 1.75; color: var(--text); background: var(--bg); padding: 0; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  .container { max-width: 700px; margin: 0 auto; padding: 0 20px; }

  /* ── Sticky Header (ultra-compact) ── */
  .sticky-head {
    position: sticky; top: 0; z-index: 100;
    background: rgba(247,247,247,0.92); backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    padding: 10px 20px 6px;
  }
  .sticky-head-inner { max-width: 700px; margin: 0 auto; }
  .head-row1 {
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
  }
  .site-logo {
    font-size: 22px; font-weight: 700; color: var(--accent);
    letter-spacing: -0.4px; line-height: 1; white-space: nowrap;
  }
  .site-sub {
    font-size: 11px; color: var(--faint); letter-spacing: 0.3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1; min-width: 0;
  }
  .head-row2 {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-top: 4px;
  }
  .head-stats {
    font-size: 11px; color: var(--faint); white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
  }
  .head-stats .sep { color: #D1D5DB; }
  .megee-inline {
    font-size: 12px; font-weight: 500; color: #94A3B8;
    text-decoration: none; white-space: nowrap; cursor: pointer;
    transition: color 0.15s;
  }
  .megee-inline:hover { color: var(--accent); }
  .cat-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 7px;
  }
  .head-sub-btn {
    font-size: 12px; font-weight: 500; padding: 3px 10px;
    border-radius: 999px; border: 1px solid #DDE3EA;
    color: #94A3B8; background: transparent; cursor: pointer;
    transition: all 0.15s; white-space: nowrap; letter-spacing: 0.2px;
    flex-shrink: 0; margin-right: 160px;
  }
  .head-sub-btn:hover { color: var(--accent); border-color: #BFCAD8; background: transparent; }

  .cat-nav {
    display: flex; gap: 5px; flex-wrap: wrap;
  }
  .cat-pill {
    font-size: 11px; font-weight: 500; padding: 3px 12px;
    border-radius: 12px; border: 1px solid var(--pill-border);
    cursor: pointer; transition: all 0.15s;
    background: var(--pill-bg); color: var(--pill-text);
    white-space: nowrap; user-select: none;
  }
  .cat-pill:hover { background: #E5E7EB; border-color: #D1D5DB; }
  .cat-pill.active { background: var(--pill-active-bg); color: var(--pill-active-text); border-color: var(--pill-active-bg); }

  /* page content below header */
  .page-content { padding-top: 16px; }

  .article-card { background: var(--card); border: 1px solid rgba(0,0,0,0.05); border-radius: 16px; padding: 24px 28px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s cubic-bezier(0.2,0,0,1); display: block; text-decoration: none; color: inherit; box-shadow: none; }
  .article-card:hover { transform: translateY(-1px); border-color: rgba(0,0,0,0.1); box-shadow: 0 4px 16px rgba(0,0,0,0.04); }
  .article-card.hidden { display: none; }
  .article-card .meta { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .article-card .date { font-size: 13px; color: var(--faint); font-weight: 500; font-variant-numeric: tabular-nums; }
  .article-card .tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .article-card .tag { font-size: 11px; padding: 2px 8px; background: var(--tag-bg); color: var(--tag-text); border-radius: 3px; font-weight: 500; letter-spacing: 0.2px; }
  .article-card h2 { font-size: 20px; font-weight: 700; line-height: 1.4; margin-bottom: 6px; color: var(--accent); }
  .article-card p { font-size: 14px; color: var(--muted); line-height: 1.7; }

  .site-footer { text-align: center; padding: 40px 0 28px; color: var(--faint); font-size: 12px; letter-spacing: 0.3px; }

  /* ── Subscribe Modal (unchanged) ── */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,39,71,0.5); z-index: 999; justify-content: center; align-items: center; padding: 20px; }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 32px 28px; width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); position: relative; animation: modal-in 0.2s ease; }
  @keyframes modal-in { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .modal-close { position: absolute; top: 14px; right: 18px; font-size: 20px; color: var(--faint); cursor: pointer; background: none; border: none; line-height: 1; }
  .modal h3 { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
  .modal .sub-hint { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
  .modal label { display: block; font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; margin-top: 12px; }
  .modal label .req { color: #DC2626; }
  .modal input, .modal textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--pill-border); border-radius: 8px; font-size: 14px; font-family: inherit; color: var(--text); outline: none; transition: border-color 0.15s; }
  .modal input:focus, .modal textarea:focus { border-color: var(--accent); }
  .modal textarea { resize: vertical; min-height: 60px; }
  .modal .sub-submit { width: 100%; margin-top: 20px; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .modal .sub-submit:hover { background: var(--accent-l); }
  .modal .sub-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .modal .sub-msg { font-size: 13px; margin-top: 10px; text-align: center; display: none; }
  .modal .sub-msg.success { color: #059669; display: block; }
  .modal .sub-msg.error { color: #DC2626; display: block; }
  .sub-row { display: none; } /* old, replaced by head-sub-btn */

  @media (max-width: 600px) {
    .container { padding: 0 12px; }
    .sticky-head { padding: 8px 12px 5px; }
    .site-logo { font-size: 20px; }
    .site-sub { font-size: 10px; }
    .head-stats { font-size: 10px; }
    .megee-inline { font-size: 10px; }
    .head-sub-btn { font-size: 10px; padding: 2px 8px; }
    .head-row2 { gap: 8px; }
    .cat-row { gap: 6px; }
    .cat-nav { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; }
    .cat-nav::-webkit-scrollbar { display: none; }
    .cat-pill { flex-shrink: 0; font-size: 10px; padding: 3px 10px; }
    .article-card { padding: 18px 16px; border-radius: 14px; }
    .article-card h2 { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="sticky-head">
  <div class="sticky-head-inner">
    <div class="head-row1">
      <span class="site-logo">novora</span>
      <span class="site-sub">包装｜材料｜制造｜质量｜AI｜可持续发展｜洞察｜阅读</span>
    </div>
    <div class="head-row2">
      <span class="head-stats" id="site-stats"></span>
    </div>
    <div class="cat-row">
      <nav class="cat-nav" id="cat-nav"></nav>
      <button class="head-sub-btn" id="sub-btn">获取更新</button>
    </div>
  </div>
</div>

<div class="container page-content">
  <div id="article-list"></div>

  <!-- Subscription Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <button class="modal-close" id="modal-close">&times;</button>
      <h3>订阅 novora</h3>
      <p class="sub-hint">每周日同步订阅列表，每周五发送文章精选。<br>无广告，可随时退订。</p>
      <form id="sub-form">
        <label>姓名 <span class="req">*</span></label>
        <input type="text" name="name" placeholder="你的姓名" required>
        <label>邮箱 <span class="req">*</span></label>
        <input type="email" name="email" placeholder="your@email.com" required>
        <label>留言</label>
        <textarea name="message" placeholder="想了解什么话题？（选填）"></textarea>
        <button type="submit" class="sub-submit" id="sub-submit">提交订阅</button>
        <div class="sub-msg" id="sub-msg"></div>
      </form>
    </div>
  </div>

  <footer class="site-footer">
    novora · 包装｜材料｜制造｜质量｜AI｜可持续发展｜洞察
  </footer>

</div>

<script>
  const articles = [
    { title: "Airless Pump 如何进行真空保持测试？", date: "2026-06-08", summary: "高端品牌做供应商审核时必考的项目。从三重密封结构到28天全周期检测，从负压挑战到温差循环，全面解析真空保持测试的方法论与判定标准。", tags: ["包装","制造","质量"], topics: ["Airless Pump","化妆品包装"], file: "articles/2026-06-08-airless-vacuum.html" },
    { title: "色母粒的分散性：为什么它决定了你产品的成败", date: "2026-06-08", summary: "因色母粒分散不良导致的质量问题占客诉60%以上。从颜料选择到分散剂配方到加工工艺，一文讲透分散性的四大关键因素，附三种实用检测方法。", tags: ["材料","制造","质量"], topics: ["色母粒"], file: "articles/2026-06-08-dispersion.html" },
    { title: "色母粒销售技巧与叙事体系", date: "2026-06-07", summary: "11章完整弹药库：从核心叙事框架到30条异议处理，从10个场景化故事到30个短视频标题库。不卖色母粒，而是解决塑料企业的生产问题。", tags: ["材料"], topics: ["色母粒","B2B销售"], file: "articles/sales-skills.html" },
    { title: "世界文学名著典藏 · 280部导读", date: "2026-06-07", summary: "17卷分卷：从古希腊荷马史诗到现代经典，涵盖英国、法国、俄国、德国、意大利、拉美、亚洲等全球文学。", tags: ["阅读"], topics: [], file: "articles/classics.html" },
    { title: "色母粒到底是什么？一分钟搞懂", date: "2026-06-07", summary: "从零开始的色母粒科普：为什么不用色粉直接染色？色母粒和色粉的本质区别是什么？", tags: ["材料","制造"], topics: ["色母粒"], file: "articles/what-is-masterbatch.html" },
    { title: "瓶子发黄怎么办？塑料厂急诊室", date: "2026-06-07", summary: "PET瓶发黄、注塑件黑点、吹塑件破裂——这些看似不同的质量问题，往往指向同一个幕后黑手。完整诊断框架与解决方案。", tags: ["材料","制造","质量"], topics: ["色母粒","注塑制造"], file: "articles/yellow-bottles.html" },
    { title: "为什么低价色母粒最后反而更贵？", date: "2026-06-07", summary: "三组算账对比：便宜色母粒VS高品质色母粒，添加量、不良率、停机率——真正的省钱是什么？", tags: ["材料","制造"], topics: ["色母粒"], file: "articles/cheap-masterbatch.html" },
    { title: "一个配方，一年帮客户省了120万", date: "2026-06-07", summary: "真实案例：添加量从4%优化到2.5%效果不变。色母粒不是越便宜越好——关键是综合成本。", tags: ["材料","制造"], topics: ["色母粒"], file: "articles/roi-120wan.html" },
    { title: "10万只瓶子报废，只因为颜色差了0.5%", date: "2026-06-07", summary: "客户验货当天，10万只瓶子直接退货。问题竟然出在色母粒添加比例上。", tags: ["材料","制造","质量"], topics: ["色母粒"], file: "articles/bottles-100k.html" },
    { title: "Silgan Dispensing 深度调研报告", date: "2026-05-16", summary: "西尔格分配系统全球最完整深度分析。14页覆盖：集团架构、中国市场28年深耕、5笔重大收购、核心技术平台。", tags: ["包装","制造"], topics: ["化妆品包装","定量泵系统"], file: "articles/silgan-dispensing.html" }
  ];

  document.getElementById('site-stats').innerHTML = articles.length + '篇<span class="sep">·</span>8栏目<span class="sep">·</span><span id="busuanzi_container_site_uv" style="display:inline;">No.<span id="busuanzi_value_site_uv"></span></span><span class="sep">·</span> ↗ <a href="https://megee.design" class="megee-inline" target="_blank" rel="noopener">megee⁺, packaging and more.</a>';

  // ── 7 categories ──
  const categories = ['全部', '包装', '材料', '制造', '质量', '可持续发展', 'AI', '洞察', '阅读'];
  const catNav = document.getElementById('cat-nav');
  const catCounts = {}; categories.forEach(c => { catCounts[c] = 0; });
  articles.forEach(a => { catCounts['全部']++; a.tags.forEach(t => { if (categories.includes(t)) catCounts[t]++; }); });

  let activeCat = '全部';

  function renderCategories() {
    const visible = categories.filter(c => catCounts[c] > 0 || c === '全部');
    catNav.innerHTML = visible.map(c => '<span class="cat-pill' + (c === activeCat ? ' active' : '') + '" data-cat="' + c + '">' + c + '</span>').join('');
    catNav.querySelectorAll('.cat-pill').forEach(p => {
      p.addEventListener('click', function() {
        activeCat = this.getAttribute('data-cat');
        renderCategories(); applyFilters();
      });
    });
  }

  function applyFilters() {
    document.querySelectorAll('.article-card').forEach(card => {
      const tags = card.getAttribute('data-tags').split(',');
      const show = activeCat === '全部' || tags.some(t => t.trim() === activeCat);
      card.classList.toggle('hidden', !show);
    });
  }

  const list = document.getElementById('article-list');
  articles.forEach(a => {
    const card = document.createElement('a');
    card.className = 'article-card'; card.href = a.file;
    card.setAttribute('data-tags', a.tags.join(','));
    card.setAttribute('data-topics', (a.topics||[]).join(','));
    card.innerHTML = '<div class="meta"><span class="date">' + a.date + '</span>' +
      (a.tags.length ? '<span class="tags">' + a.tags.map(t => '<span class="tag">' + t + '</span>').join('') + '</span>' : '') +
      '</div><h2>' + a.title + '</h2><p>' + a.summary + '</p>';
    list.appendChild(card);
  });

  renderCategories();
</script>

<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
<script>
  // ── Subscribe Modal ──
  (function(){
    var btn = document.getElementById('sub-btn');
    var ov = document.getElementById('modal-overlay');
    var close = document.getElementById('modal-close');
    var form = document.getElementById('sub-form');
    var msg = document.getElementById('sub-msg');
    var submitBtn = document.getElementById('sub-submit');

    btn.addEventListener('click', function(){ ov.classList.add('show'); });
    close.addEventListener('click', function(){ ov.classList.remove('show'); });
    ov.addEventListener('click', function(e){ if (e.target === ov) ov.classList.remove('show'); });

    form.addEventListener('submit', function(e){
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = '提交中...';
      msg.className = 'sub-msg'; msg.textContent = '';

      var data = new FormData(form);

      fetch('https://formsubmit.co/ajax/53432885@qq.com', {
        method: 'POST', body: data, headers: { 'Accept': 'application/json' }
      })
      .then(function(r){
        if (r.ok) {
          msg.className = 'sub-msg success';
          msg.textContent = '订阅成功！';
          form.reset();
          submitBtn.textContent = '已订阅';
        } else {
          return r.json().then(function(d){ throw new Error(d.error || '提交失败'); });
        }
      })
      .catch(function(err){
        msg.className = 'sub-msg error';
        msg.textContent = '提交失败，请稍后重试';
        submitBtn.disabled = false;
        submitBtn.textContent = '提交订阅';
      });
    });
  })();

  // Auto-refresh: check for new version on load & tab return
  (function() {
    var VER = 'https://coadyke.github.io/novora-site/version.txt';
    var KEY = 'nv_v';
    function check() {
      fetch(VER + '?t=' + Date.now(), {cache: 'no-store'})
        .then(function(r) { return r.text(); })
        .then(function(v) {
          v = v.trim();
          var old = localStorage.getItem(KEY);
          localStorage.setItem(KEY, v);
          if (old && old !== v) location.reload();
        })
        .catch(function(){}); // offline: silent
    }
    check();
    document.addEventListener('visibilitychange', function() {
      if (!document.hidden) check();
    });
  })();

  // Format UV counter: "No.12,486"
  (function check() {
    var el = document.getElementById('busuanzi_value_site_uv');
    if (el && el.textContent && /^\d+$/.test(el.textContent.trim())) {
      el.textContent = (6968 + Number(el.textContent.trim())).toLocaleString('en-US');
    } else {
      setTimeout(check, 800);
    }
  })();
</script>
</body>
</html>
